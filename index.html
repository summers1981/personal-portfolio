<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Colin Summers — Design Architect for AI/LLM systems. New site coming soon." />
  <title>Colin Summers</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏗️</text></svg>" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #080808;
      --bg-2:     #111111;
      --accent:   #F7C948;
      --text:     #F0F0F0;
      --text-sub: #999;
      --border:   #1E1E1E;
      --ease:     cubic-bezier(0.4, 0, 0.2, 1);
    }

    html { -webkit-font-smoothing: antialiased; }

    body {
      background-color: var(--bg);
      background-image: radial-gradient(circle, #1f1f1f 1px, transparent 1px);
      background-size: 28px 28px;
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      top: -10%;
      right: -10%;
      width: 70vw;
      height: 70vw;
      background: radial-gradient(circle, rgba(247,201,72,0.06) 0%, rgba(247,201,72,0.025) 35%, rgba(247,201,72,0.008) 60%, transparent 75%);
      pointer-events: none;
      z-index: 0;
    }

    a { color: inherit; text-decoration: none; }

    /* Header */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 80px;
      display: flex;
      align-items: center;
      padding: 0 clamp(20px, 5vw, 60px);
      background: rgba(8,8,8,0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      z-index: 10;
    }

    .logo-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: var(--accent);
      color: #000;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      border-radius: 6px;
    }

    /* Main */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px clamp(20px, 5vw, 60px) 60px;
      position: relative;
      z-index: 1;
    }

    .content {
      max-width: 600px;
      text-align: center;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.7s var(--ease) 0.15s forwards;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 28px;
    }

    .eyebrow::before {
      content: '';
      display: block;
      width: 20px;
      height: 1px;
      background: var(--accent);
    }

    h1 {
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin-bottom: 24px;
    }

    p {
      font-size: 1.05rem;
      line-height: 1.7;
      color: var(--text-sub);
      margin-bottom: 48px;
    }

    .contact-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: var(--accent);
      color: #000;
      font-size: 0.85rem;
      font-weight: 600;
      border-radius: 6px;
      transition: opacity 0.2s var(--ease), transform 0.2s var(--ease);
    }

    .contact-link:hover { opacity: 0.88; transform: translateY(-1px); }

    /* Footer */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 24px clamp(20px, 5vw, 60px);
      border-top: 1px solid var(--border);
      font-size: 0.78rem;
      color: var(--text-sub);
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" aria-label="Home"><span class="logo-mark">CS</span></a>
  </header>

  <main>
    <div class="content">
      <span class="eyebrow">Work in progress</span>
      <h1>Something new is on its way.</h1>
      <p>I'm redesigning and rebuilding this portfolio. Check back soon, or get in touch if you'd like to connect in the meantime.</p>
      <a href="mailto:colinsummers@gmail.com" class="contact-link">Get in touch</a>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Colin Summers</p>
  </footer>

</body>
</html>
